version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sinarsteel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: steelmaster
      POSTGRES_PASSWORD: steelmaster
      POSTGRES_DB: sinarsteel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sinarsteel_network

  redis:
    image: redis:7-alpine
    container_name: sinarsteel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sinarsteel_network

volumes:
  postgres_data:
  redis_data:

networks:
  sinarsteel_network:
    driver: bridge